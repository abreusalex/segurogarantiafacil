<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSP: bloqueia inline scripts não autorizados e recursos externos não listados -->
  <meta http-equiv="Content-Security-Policy"
        content="
          default-src 'self';
          script-src  'self';
          style-src   'self' https://fonts.googleapis.com;
          font-src    https://fonts.gstatic.com;
          img-src     'self' data:;
          connect-src 'none';
        ">

  <title>Calculadora — SGF</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora&family=Outfit&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="calculadora-sgf.css">
</head>

<body>

  <h1>Calculadora de Seguro Garantia</h1>

  <!-- MODOS -->
  <div class="mode-bar" role="group" aria-label="Modo de cálculo">
    <button data-mode="premio" class="btn-mode active" type="button">Calcular Prêmio</button>
    <button data-mode="taxa"   class="btn-mode"        type="button">Descobrir Taxa</button>
    <button data-mode="is"     class="btn-mode"        type="button">Descobrir IS</button>
  </div>

  <hr>

  <!-- FORMULÁRIO — campos rotulados para acessibilidade e WAF previsível -->
  <div class="form-grid" id="form" role="form" aria-label="Parâmetros de cálculo">

    <label for="campo-a" id="label-a">Importância Segurada (R$)</label>
    <input id="campo-a"
           type="text"
           inputmode="decimal"
           autocomplete="off"
           aria-labelledby="label-a">

    <label for="campo-b" id="label-b">Taxa (%)</label>
    <input id="campo-b"
           type="text"
           inputmode="decimal"
           autocomplete="off"
           aria-labelledby="label-b">

    <label for="campo-dias" id="label-dias">Prazo (dias)</label>
    <input id="campo-dias"
           type="text"
           inputmode="numeric"
           autocomplete="off"
           aria-labelledby="label-dias">

    <button id="btn-calcular" type="button">Calcular</button>

  </div>

  <!-- RESULTADO -->
  <section class="result" aria-live="polite" aria-atomic="true">
    <strong id="res-label">Resultado</strong>
    <div id="res-value">—</div>
  </section>

  <!-- BREAKDOWN — preenchido via createElement, nunca innerHTML com dados do usuário -->
  <div id="breakdown" role="table" aria-label="Detalhamento do cálculo"></div>

  <!-- JS externo — carregado após o DOM, sem atributo defer para compatibilidade total -->
  <script src="calculadora-sgf.js"></script>

</body>
</html>
