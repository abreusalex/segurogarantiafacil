<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SGF · Post Divulgação · Série Glossário</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #2a2118;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 24px;
      gap: 16px;
    }
    .hint {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
    .post-wrap {
      width: min(1080px, 92vw);
      aspect-ratio: 1;
    }
  </style>
</head>
<body>

<p class="hint">1080 × 1080 · Instagram / LinkedIn</p>

<div class="post-wrap">
<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="terra-amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C05A35"/>
      <stop offset="100%" stop-color="#C4900A"/>
    </linearGradient>
    <linearGradient id="bg-warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F4EEE5"/>
    </linearGradient>
    <!-- Subtle shadow for shield -->
    <filter id="shield-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#C05A35" flood-opacity="0.18"/>
    </filter>
    <!-- Soft shadow for text area -->
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->

  <rect width="1080" height="1080" fill="url(#bg-warm)"/>

  <!-- Very subtle grain texture via pattern -->

  <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="1" height="1" x="0" y="0" fill="rgba(28,23,18,0.02)"/>
    <rect width="1" height="1" x="2" y="2" fill="rgba(28,23,18,0.015)"/>
  </pattern>
  <rect width="1080" height="1080" fill="url(#grain)"/>

  <!-- ── THIN TOP BAR ── -->

  <rect x="0" y="0" width="1080" height="5" fill="url(#terra-amber)"/>

  <!-- ── CONCENTRIC CIRCLES (decorative, centered, faint) ── -->

  <circle cx="540" cy="410" r="370" fill="none" stroke="rgba(192,90,53,0.055)" stroke-width="1"/>
  <circle cx="540" cy="410" r="300" fill="none" stroke="rgba(192,90,53,0.045)" stroke-width="1"/>
  <circle cx="540" cy="410" r="230" fill="none" stroke="rgba(192,90,53,0.035)" stroke-width="1"/>
  <circle cx="540" cy="410" r="160" fill="none" stroke="rgba(192,90,53,0.025)" stroke-width="1"/>

  <!-- ── LOGO: SHIELD ── -->

  <!-- Shield shadow/glow plate -->

  <ellipse cx="540" cy="388" rx="100" ry="20" fill="rgba(192,90,53,0.10)"/>

  <!-- Shield body — terra fill -->

  <g transform="translate(540,270) scale(2.6)" filter="url(#shield-shadow)">
    <path d="M0,-45 L38,-29 L38,14 C38,36 20,51 0,59 C-20,51 -38,36 -38,14 L-38,-29 Z"
          fill="#C05A35"/>
    <!-- Inner shield highlight -->
    <path d="M0,-38 L30,-24 L30,14 C30,30 16,44 0,52 C-16,44 -30,30 -30,14 L-30,-24 Z"
          fill="rgba(255,255,255,0.07)"/>
    <!-- Checkmark -->
    <path d="M-18,10 L-4,26 L22,-10"
          stroke="#FAF7F2" stroke-width="7.5" stroke-linecap="round"
          stroke-linejoin="round" fill="none"/>
  </g>

  <!-- ── SÉRIE CHIP ── -->

<rect x="420" y="492" width="240" height="26" rx="13"
fill="rgba(192,90,53,0.10)" stroke="rgba(192,90,53,0.30)" stroke-width="1"/>
<text x="540" y="510" text-anchor="middle"
font-family="'Courier New', monospace"
font-size="10" font-weight="700" letter-spacing="3"
fill="#C05A35">SÉRIE GLOSSÁRIO</text>

  <!-- ── MAIN HEADLINE ── -->

<text x="540" y="594" text-anchor="middle"
font-family="'Playfair Display', Georgia, serif"
font-size="72" font-weight="700"
fill="#1C1712" letter-spacing="-1">11 conceitos</text>

<text x="540" y="658" text-anchor="middle"
font-family="'Playfair Display', Georgia, serif"
font-size="52" font-weight="500" font-style="italic"
fill="#C05A35">que todo profissional</text>

<text x="540" y="718" text-anchor="middle"
font-family="'Playfair Display', Georgia, serif"
font-size="52" font-weight="500" font-style="italic"
fill="#C05A35">deveria conhecer.</text>

  <!-- ── DIVIDER ── -->

  <rect x="440" y="748" width="200" height="2" rx="1" fill="url(#terra-amber)" opacity="0.6"/>

  <!-- ── SUPPORTING TEXT ── -->

<text x="540" y="792" text-anchor="middle"
font-family="'DM Sans', system-ui, sans-serif"
font-size="22" font-weight="300"
fill="#6B5C50">Seguro Garantia em linguagem direta,</text>

<text x="540" y="820" text-anchor="middle"
font-family="'DM Sans', system-ui, sans-serif"
font-size="22" font-weight="300"
fill="#6B5C50">com base na Circular SUSEP nº 662/2022 e na Lei 15.040/2024.</text>

  <!-- ── CTA BUTTON ── -->

  <!-- Button background -->

<rect x="298" y="870" width="484" height="72" rx="36"
fill="#C05A35"/>

  <!-- Button inner highlight -->

<rect x="299" y="871" width="482" height="35" rx="35"
fill="rgba(255,255,255,0.07)"/>

<text x="490" y="914" text-anchor="middle"
font-family="'DM Sans', system-ui, sans-serif"
font-size="19" font-weight="500"
fill="#FAF7F2" letter-spacing="0.5">segurogarantiafacil.com</text>

<text x="490" y="934" text-anchor="middle"
font-family="'Courier New', monospace"
font-size="12" font-weight="700" letter-spacing="2"
fill="rgba(250,247,242,0.65)">/glossario</text>

  <!-- Arrow circle -->

  <circle cx="748" cy="906" r="26" fill="rgba(255,255,255,0.15)"/>
  <text x="748" y="914" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="20" fill="#FAF7F2">→</text>

  <!-- ── BOTTOM STRIP ── -->

  <rect x="0" y="1010" width="1080" height="70" fill="rgba(28,23,18,0.04)"/>
  <line x1="0" y1="1010" x2="1080" y2="1010" stroke="rgba(28,23,18,0.08)" stroke-width="1"/>

  <!-- Logo mini + handle -->

  <!-- Mini shield -->

  <g transform="translate(64,1045) scale(0.38)">
    <path d="M0,-45 L38,-29 L38,14 C38,36 20,51 0,59 C-20,51 -38,36 -38,14 L-38,-29 Z"
          fill="#C05A35"/>
    <path d="M-18,10 L-4,26 L22,-10"
          stroke="#FAF7F2" stroke-width="9" stroke-linecap="round"
          stroke-linejoin="round" fill="none"/>
  </g>

<text x="88" y="1048"
font-family="'Courier New', monospace"
font-size="11" font-weight="700" letter-spacing="2.5"
fill="#3D342A">SEGURO GARANTIA FÁCIL</text>

<text x="88" y="1064"
font-family="'Courier New', monospace"
font-size="10" letter-spacing="1.5"
fill="#9A8070">@segurogarantiafaciloficial</text>

  <!-- Acesso gratuito badge -->

<rect x="830" y="1025" width="210" height="34" rx="17"
fill="rgba(196,144,10,0.12)" stroke="rgba(196,144,10,0.30)" stroke-width="1"/>
<text x="935" y="1047" text-anchor="middle"
font-family="'Courier New', monospace"
font-size="9" font-weight="700" letter-spacing="2"
fill="#C4900A">ACESSO GRATUITO</text>

</svg>
</div>

<p class="hint">abra no browser · screenshot em escala 1:1</p>

</body>
</html>
